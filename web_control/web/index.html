<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>POCAA — Pilotage du robot</title>
<style>
  :root{ --navy:#0E2436; --navy2:#13334E; --teal:#2DD4BF; --cyan:#38BDF8;
         --indigo:#818CF8; --amber:#FBBF24; --red:#EF4444; --txt:#E2ECF5; --muted:#9FB3C8; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--navy); color:var(--txt);
        display:flex; flex-direction:column; align-items:center; min-height:100vh; }
  header{ width:100%; max-width:760px; padding:16px 18px 4px; }
  h1{ font-size:20px; margin:0 0 2px; }
  .sub{ color:var(--muted); font-size:13px; }
  .card{ background:var(--navy2); border:1px solid #1E4361; border-radius:12px;
         padding:14px; margin:10px; width:100%; max-width:760px; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  label{ font-size:12px; color:var(--muted); display:block; margin-bottom:3px; }
  input{ background:#0B1C2C; border:1px solid #1E4361; color:var(--txt);
         border-radius:8px; padding:8px 10px; font-size:14px; }
  button{ border:0; border-radius:8px; padding:10px 14px; font-size:14px; font-weight:bold;
          cursor:pointer; background:var(--teal); color:#06231e; }
  button.ghost{ background:#1E4361; color:var(--txt); }
  button.stop{ background:var(--red); color:#fff; }
  #status{ font-size:13px; }
  .dot{ display:inline-block; width:9px; height:9px; border-radius:50%; background:var(--muted); margin-right:6px; }
  .dot.on{ background:var(--teal); } .dot.off{ background:var(--red); }
  canvas{ background:#0B1C2C; border-radius:12px; width:100%; max-width:760px; touch-action:none; display:block; margin:0 auto; }
  .pad{ display:grid; grid-template-columns:repeat(3,64px); grid-gap:8px; justify-content:center; margin-top:8px; }
  .pad button{ height:56px; font-size:20px; }
  .pad .empty{ visibility:hidden; }
  .tele{ font-family:ui-monospace,Consolas,monospace; font-size:13px; color:var(--cyan); }
  .hint{ color:var(--muted); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>POCAA — Pilotage du robot 🤖</h1>
  <div class="sub">Contrôle de la simulation à distance via WebSocket</div>
</header>

<div class="card">
  <div class="row">
    <div><label>Room</label><input id="room" value="demo" size="10"></div>
    <div><label>Token</label><input id="token" value="demo-token-change-me" size="20"></div>
    <div style="align-self:flex-end"><button id="connect">Se connecter</button></div>
    <div style="align-self:flex-end" id="status"><span class="dot" id="dot"></span><span id="statusText">déconnecté</span></div>
  </div>
</div>

<canvas id="view" width="760" height="560"></canvas>

<div class="card">
  <div class="row" style="justify-content:space-between">
    <div class="tele" id="tele">en attente de télémétrie…</div>
    <button class="stop" id="estop">STOP</button>
  </div>
  <div class="pad">
    <span class="empty"></span>
    <button data-k="up">▲</button>
    <span class="empty"></span>
    <button data-k="left">◀</button>
    <button data-k="down">▼</button>
    <button data-k="right">▶</button>
  </div>
  <p class="hint">Clavier : flèches ou ZQSD. Boutons tactiles ci-dessus pour mobile. Relâche tout pour t'arrêter.</p>
</div>

<script>
const V_FWD = 0.6, V_BACK = -0.25, W_TURN = 1.5;   // m/s, m/s, rad/s
let ws = null, trail = [], last = null;
const cvs = document.getElementById('view'), ctx = cvs.getContext('2d');
const pressed = { up:false, down:false, left:false, right:false };

function wsURL(){
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const room = encodeURIComponent(document.getElementById('room').value || 'demo');
  const token = encodeURIComponent(document.getElementById('token').value || '');
  // si la page est servie par le relais, on vise le même hôte ; sinon, à adapter
  const host = location.host || 'localhost:8000';
  return `${proto}://${host}/ws/pilot?room=${room}&token=${token}`;
}

function setStatus(txt, on){
  document.getElementById('statusText').textContent = txt;
  const d = document.getElementById('dot'); d.className = 'dot ' + (on ? 'on' : 'off');
}

function connect(){
  if (ws) { ws.close(); ws = null; }
  ws = new WebSocket(wsURL());
  ws.onopen = () => setStatus('connecté', true);
  ws.onclose = () => setStatus('déconnecté', false);
  ws.onerror = () => setStatus('erreur de connexion', false);
  ws.onmessage = (ev) => {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    if (m.type === 'tel'){ last = m; trail.push([m.x, m.y]); if (trail.length > 400) trail.shift(); draw(m); }
    if (m.type === 'status'){ setStatus(m.robot_online ? 'connecté (robot en ligne)' : 'connecté (robot hors ligne)', true); }
  };
}

function sendCmd(v, w){
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type:'cmd', v, w }));
}

function currentCmd(){
  let v = 0, w = 0;
  if (pressed.up) v = V_FWD;
  if (pressed.down) v = V_BACK;
  if (pressed.left) w = W_TURN;
  if (pressed.right) w = -W_TURN;
  return [v, w];
}

// envoi régulier à 20 Hz tant qu'une touche est active
setInterval(() => {
  const [v, w] = currentCmd();
  if (v !== 0 || w !== 0) sendCmd(v, w);
}, 50);

function press(k, on){
  if (!(k in pressed)) return;
  const was = pressed.up||pressed.down||pressed.left||pressed.right;
  pressed[k] = on;
  const now = pressed.up||pressed.down||pressed.left||pressed.right;
  if (was && !now) sendCmd(0, 0);   // arrêt net dès qu'on relâche tout
}

// clavier
const KEYS = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
               z:'up', s:'down', q:'left', d:'right', Z:'up', S:'down', Q:'left', D:'right' };
addEventListener('keydown', e => { if (KEYS[e.key]){ e.preventDefault(); press(KEYS[e.key], true);} });
addEventListener('keyup',   e => { if (KEYS[e.key]){ e.preventDefault(); press(KEYS[e.key], false);} });

// boutons tactiles
document.querySelectorAll('.pad button').forEach(b => {
  const k = b.dataset.k;
  const on = e => { e.preventDefault(); press(k, true); };
  const off = e => { e.preventDefault(); press(k, false); };
  b.addEventListener('pointerdown', on);
  b.addEventListener('pointerup', off);
  b.addEventListener('pointerleave', off);
  b.addEventListener('pointercancel', off);
});

document.getElementById('estop').addEventListener('click', () => { for (const k in pressed) pressed[k]=false; sendCmd(0,0); });
document.getElementById('connect').addEventListener('click', connect);

// rendu du robot
function draw(m){
  const W = cvs.width, H = cvs.height;
  ctx.clearRect(0,0,W,H);
  const xlim = m.xlim || 2.1, ylim = m.ylim || 1.6;
  const sx = (W*0.46) / xlim, sy = (H*0.46) / ylim, s = Math.min(sx, sy);
  const toPx = (x,y) => [W/2 + x*s, H/2 - y*s];
  // cadre
  ctx.strokeStyle = '#1E4361'; ctx.lineWidth = 1;
  const [ax,ay] = toPx(-xlim,-ylim), [bx,by] = toPx(xlim,ylim);
  ctx.strokeRect(ax, by, bx-ax, ay-by);
  // trace
  ctx.strokeStyle = '#818CF8'; ctx.lineWidth = 2; ctx.beginPath();
  trail.forEach(([x,y],i) => { const [px,py]=toPx(x,y); i?ctx.lineTo(px,py):ctx.moveTo(px,py); });
  ctx.stroke();
  // robot
  const [px,py] = toPx(m.x, m.y), r = (m.track ? m.track/2 : 0.15) * s;
  ctx.fillStyle = (m.state === 'NORMAL') ? '#2DD4BF' : '#EF4444';
  ctx.beginPath(); ctx.arc(px,py,r,0,7); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath();
  ctx.moveTo(px,py); ctx.lineTo(px + Math.cos(m.theta)*r*1.6, py - Math.sin(m.theta)*r*1.6); ctx.stroke();
  // télémétrie texte
  document.getElementById('tele').textContent =
    `état:${m.state}  v=${m.v.toFixed(2)} m/s  w=${m.w.toFixed(2)} rad/s  ` +
    `roueG=${m.vL.toFixed(1)} roueD=${m.vR.toFixed(1)} rad/s`;
}
draw({x:0,y:0,theta:Math.PI/2,v:0,w:0,vL:0,vR:0,state:'—',xlim:2.1,ylim:1.6,track:0.3});
</script>
</body>
</html>
